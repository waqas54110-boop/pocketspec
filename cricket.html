<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏏 Cricket Live Scores — pocketspec</title>
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            width: 100%;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fc;
            color: #1a1a2e;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }
        ::selection {
            background: #01411C;
            color: #fff;
        }

        /* ===== COLOR ===== */
        :root {
            --green: #01411C;
            --green-light: #e8f5ee;
            --gold: #d4a02b;
            --gold-light: #fdf3d5;
            --ink: #1a1a2e;
            --ink-soft: #4a4a6a;
            --ink-faint: #8e8ea0;
            --surface: #ffffff;
            --surface-2: #f6f7f9;
            --line: #eaeaef;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 56px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 9999px;
            --display: 'Space Grotesk', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ===== HEADER ===== */
        header {
            position: sticky;
            top: 0;
            z-index: 60;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--line);
            width: 100%;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
            padding: 0 24px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            gap: 20px;
        }
        .logo {
            font-family: var(--display);
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.02em;
            color: var(--green);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logo span {
            font-family: var(--mono);
            font-size: 0.5rem;
            font-weight: 500;
            color: var(--ink-soft);
            background: var(--surface-2);
            padding: 1px 8px;
            border-radius: var(--radius-full);
            letter-spacing: 0.04em;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--ink-soft);
            flex: 1;
            justify-content: center;
        }
        .nav-links a {
            transition: color 0.2s var(--ease);
            position: relative;
            padding: 4px 0;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0;
            height: 2px;
            background: var(--green);
            transition: width 0.25s var(--ease);
        }
        .nav-links a:hover {
            color: var(--ink);
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-links a.active {
            color: var(--green);
            font-weight: 700;
        }
        .nav-links a.active::after {
            width: 100%;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .nav-quiz-btn {
            font-weight: 600;
            font-size: 0.72rem;
            background: var(--gold);
            color: #1a1a2e;
            padding: 7px 18px;
            border-radius: var(--radius-full);
            transition: all 0.2s var(--ease);
            box-shadow: 0 2px 12px rgba(212, 160, 43, 0.20);
            flex-shrink: 0;
            white-space: nowrap;
            border: none;
            cursor: pointer;
        }
        .nav-quiz-btn:hover {
            background: #b88a20;
            transform: translateY(-1px);
        }
        .burger {
            display: none;
            width: 38px;
            height: 38px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: var(--surface);
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .burger span,
        .burger span::before,
        .burger span::after {
            content: '';
            display: block;
            width: 17px;
            height: 2px;
            background: var(--ink);
            position: relative;
            transition: all 0.2s;
        }
        .burger span::before {
            content: '';
            position: absolute;
            top: -5px;
            width: 17px;
            height: 2px;
            background: var(--ink);
        }
        .burger span::after {
            content: '';
            position: absolute;
            top: 5px;
            width: 17px;
            height: 2px;
            background: var(--ink);
        }
        .mobile-panel {
            display: none;
            width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--line);
            padding: 12px 24px 20px;
            flex-direction: column;
            gap: 4px;
        }
        .mobile-panel.open {
            display: flex;
        }
        .mobile-panel a {
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ink-soft);
            border-bottom: 1px solid var(--line);
        }
        .mobile-panel a:last-child {
            border-bottom: none;
        }
        .mobile-panel a.active {
            color: var(--green);
        }

        /* ===== CRICKET HERO ===== */
        .cric-hero {
            background: linear-gradient(145deg, #e8f5ee, #f8f9fc);
            padding: 32px 0 20px;
            border-bottom: 1px solid var(--line);
            text-align: center;
        }
        .cric-hero h1 {
            font-family: var(--display);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--ink);
        }
        .cric-hero p {
            color: var(--ink-soft);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .cric-hero .live-badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 700;
            background: #fdeaea;
            color: #e5484d;
            padding: 4px 16px;
            border-radius: var(--radius-full);
            margin-top: 6px;
            animation: pulse 1.4s infinite;
        }
        .cric-hero .live-badge .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e5484d;
            margin-right: 6px;
            vertical-align: middle;
            animation: cricPulse 1.2s infinite;
        }
        @keyframes cricPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        /* ===== MATCH LIST (horizontal strip) ===== */
        .cric-matchlist-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            width: 100%;
            padding: 12px 0;
        }
        .cric-matchlist-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .cric-matchlist-title {
            font-family: var(--mono);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-faint);
            margin-bottom: 6px;
        }
        .cric-matchlist-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        .cric-matchlist-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .cric-matchlist-item {
            flex: 0 0 auto;
            min-width: 200px;
            max-width: 200px;
            background: var(--surface-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.15s;
        }
        .cric-matchlist-item:hover {
            border-color: var(--green);
            transform: translateY(-2px);
        }
        .cric-matchlist-item.active {
            border-color: var(--green);
            background: var(--green-light);
        }
        .cric-matchlist-item .mli-badge {
            font-family: var(--mono);
            font-size: 0.5rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: var(--radius-full);
            display: inline-block;
            margin-bottom: 4px;
        }
        .cric-matchlist-item .mli-badge.live {
            background: #fdeaea;
            color: #e5484d;
        }
        .cric-matchlist-item .mli-badge.upcoming {
            background: var(--gold-light);
            color: var(--gold);
        }
        .cric-matchlist-item .mli-teams {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cric-matchlist-item .mli-status {
            font-size: 0.6rem;
            color: var(--ink-soft);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== MAIN TICKER CARD ===== */
        .cric-ticker-section {
            padding: 24px 0 32px;
        }
        .cric-card-outer {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cric-nav-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--line);
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.15s var(--ease);
            font-size: 0.9rem;
        }
        .cric-nav-btn:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .cric-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .cric-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            padding: 14px 18px;
            width: 100%;
            cursor: pointer;
            transition: box-shadow 0.2s var(--ease), transform 0.2s var(--ease);
        }
        .cric-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
        }
        .cric-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .cric-card-desc {
            font-size: 0.7rem;
            color: var(--ink-soft);
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 270px;
        }
        .cric-card-badge {
            font-family: var(--mono);
            font-size: 0.55rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .cric-card-badge.live {
            background: #fdeaea;
            color: #e5484d;
        }
        .cric-card-badge.live .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #e5484d;
            margin-right: 4px;
            animation: cricPulse 1.2s infinite;
        }
        .cric-card-badge.upcoming {
            background: var(--gold-light);
            color: var(--gold);
        }

        .cric-team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 4px 0;
        }
        .cric-team-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .cric-team-flag {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--green);
            color: #fff;
            font-family: var(--display);
            font-weight: 800;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cric-team-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cric-team-score {
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--ink);
            flex-shrink: 0;
            text-align: right;
            white-space: nowrap;
        }
        .cric-team-score span {
            color: var(--ink-faint);
            font-weight: 500;
            font-size: 0.7rem;
        }
        .cric-card-status {
            font-size: 0.75rem;
            color: var(--green);
            font-weight: 600;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--line);
        }
        .cric-card-status.upcoming-status {
            color: var(--gold);
        }

        .cric-dots-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 12px;
        }
        .cric-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--line);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .cric-dot.active {
            background: var(--green);
            transform: scale(1.4);
        }
        .cric-count-label {
            font-family: var(--mono);
            font-size: 0.5rem;
            color: var(--ink-faint);
            margin-left: 6px;
        }

        /* ===== BUTTON ROW (Commentary / Scorecard) ===== */
        .cric-btn-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .cric-comm-btn,
        .cric-sc-btn {
            flex: 1;
            font-family: var(--mono);
            font-size: 0.62rem;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: var(--radius-full);
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 0.15s var(--ease);
            text-align: center;
        }
        .cric-comm-btn:hover {
            background: var(--green-light);
            border-color: var(--green);
            color: var(--green);
        }
        .cric-sc-btn:hover {
            background: var(--gold-light);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ===== COMMENTARY CARD ===== */
        .cric-comm-card,
        .cric-sc-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            padding: 14px 16px;
            margin-top: 10px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
        .cric-comm-card.open,
        .cric-sc-card.open {
            display: block;
        }
        .cric-comm-card-head,
        .cric-sc-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }
        .cric-comm-card-title,
        .cric-sc-card-title {
            font-family: var(--display);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cric-card-close-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink-soft);
            font-size: 0.7rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cric-card-close-btn:hover {
            border-color: #e5484d;
            color: #e5484d;
        }

        .cric-comm-list {
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
        }
        .cric-comm-item {
            background: var(--surface-2);
            border-left: 3px solid var(--line);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 0.78rem;
            line-height: 1.4;
        }
        .cric-comm-item .cco-over {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--ink-faint);
            margin-right: 6px;
        }
        .cric-comm-item.wicket {
            border-left-color: #e5484d;
            background: #fdeaea;
            font-weight: 700;
        }
        .cric-comm-item.boundary {
            border-left-color: var(--gold);
            background: var(--gold-light);
            font-weight: 700;
        }
        .cric-comm-live-tag {
            font-family: var(--mono);
            font-size: 0.55rem;
            color: var(--ink-faint);
            text-align: center;
            margin-top: 8px;
        }
        .cric-comm-item b {
            color: var(--ink);
        }

        /* ===== SCORECARD ===== */
        .cric-sc-innings-tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .cric-sc-tab {
            font-family: var(--mono);
            font-size: 0.58rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink-soft);
            cursor: pointer;
            white-space: nowrap;
        }
        .cric-sc-tab.active {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }
        .cric-sc-body {
            max-height: 50vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .cric-sc-section-title {
            font-family: var(--display);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--ink);
            margin: 10px 0 4px;
        }
        .cric-sc-table-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .cric-sc-table {
            width: 100%;
            min-width: 340px;
            border-collapse: collapse;
            font-size: 0.68rem;
        }
        .cric-sc-table th {
            text-align: left;
            font-family: var(--mono);
            font-size: 0.5rem;
            text-transform: uppercase;
            color: var(--ink-faint);
            padding: 4px 5px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }
        .cric-sc-table td {
            padding: 4px 5px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }
        .cric-sc-table td.name-col,
        .cric-sc-table th.name-col {
            white-space: normal;
            min-width: 100px;
        }
        .cric-sc-table td.dismissal {
            color: var(--ink-faint);
            font-size: 0.6rem;
        }
        .cric-sc-extras,
        .cric-sc-total {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 5px 0;
        }
        .cric-sc-total {
            color: var(--green);
        }

        /* ===== OVERLAY / MODAL (match detail) ===== */
        .qv-overlay {
            position: fixed;
            inset: 0;
            z-index: 90;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }
        .qv-overlay.open {
            display: flex;
        }
        .qv-modal {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow: auto;
            padding: 24px;
            position: relative;
            box-shadow: var(--shadow-lg);
        }
        .qv-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink-soft);
            cursor: pointer;
            font-size: 0.85rem;
            line-height: 1;
            transition: all 0.15s;
        }
        .qv-close:hover {
            color: var(--ink);
            border-color: #e5484d;
        }
        .cric-scorecard-body h3 {
            font-family: var(--display);
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .cric-sc-live {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--green);
            background: var(--green-light);
            padding: 3px 10px;
            border-radius: var(--radius-full);
            display: inline-block;
            margin-bottom: 8px;
        }
        .cric-sc-update {
            font-size: 0.8rem;
            color: var(--ink-soft);
            margin-bottom: 12px;
        }
        .cric-sc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            margin-bottom: 10px;
        }
        .cric-sc-table th {
            text-align: left;
            font-family: var(--mono);
            font-size: 0.55rem;
            text-transform: uppercase;
            color: var(--ink-faint);

    <!-- ===== TOAST STACK ===== -->

    <!-- ============================================================
    CRICKET SCRIPT — RapidAPI Cricbuzz
    ============================================================ -->
    <script>
        // ============================================================
        // TOAST
        // ============================================================
        function showToast(msg) {
            const stack = document.getElementById('toastStack');
            if (!stack) return;
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            stack.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 2400);
        }

        // ============================================================
        // API CONFIG
        // ============================================================
        const RAPIDAPI_KEY = "6f9ac27d54msha0f1c4baff68c42p148191jsn84052a372fb1";
        const RAPIDAPI_HOST = "cricbuzz-cricket.p.rapidapi.com";

        function cricFetch(path) {
            return fetch("https://" + RAPIDAPI_HOST + path, {
                headers: {
                    "x-rapidapi-host": RAPIDAPI_HOST,
                    "x-rapidapi-key": RAPIDAPI_KEY
                }
            }).then(r => r.json()).catch(() => null);
        }

        // ============================================================
        // STATE
        // ============================================================
        let cricMatches = [];
        let cricMode = "live";
        let cricIndex = 0;
        let cricRotateTimer = null;
        let cricPaused = false;
        let commRefreshTimer = null;
        let commLastBallNbr = null;
        let scInningsData = [];
        let scActiveIdx = 0;

        // ============================================================
        // HELPERS
        // ============================================================
        function flattenMatches(data) {
            let all = [];
            if (!data || !data.typeMatches) return all;
            data.typeMatches.forEach(function(tm) {
                (tm.seriesMatches || []).forEach(function(sm) {
                    const w = sm.seriesAdWrapper;
                    if (w && w.matches) w.matches.forEach(function(m) { all.push(m); });
                });
            });
            return all;
        }

        function isOngoing(m) {
            const st = m.matchInfo && m.matchInfo.state;
            const dead = ["Complete", "Abandoned", "Cancelled", "Preview", "Not Started"];
            return st && dead.indexOf(st) === -1;
        }

        function within10Days(m) {
            const start = Number(m.matchInfo && m.matchInfo.startDate);
            if (!start) return true;
            const diffDays = (start - Date.now()) / (1000 * 60 * 60 * 24);
            return diffDays >= -1 && diffDays <= 10;
        }

        function getCurrentMatchId() {
            const m = cricMatches[cricIndex];
            return m && m.matchInfo ? m.matchInfo.matchId : null;
        }

        function matchTitle(m) {
            const mi = m.matchInfo;
            return (mi.team1.teamSName || mi.team1.teamName) + " vs " + (mi.team2.teamSName || mi.team2.teamName) +
                " · " + (mi.matchDesc || "");
        }

        function initials(team) {
            return (team.teamSName || team.teamName || "??").slice(0, 3).toUpperCase();
        }

        function formatCommText(c) {
            let txt = c.commtxt || "";
            const formats = c.commentaryformats;
            if (formats && formats.length) {
                formats.forEach(function(f) {
                    if (f.type === "bold" && f.value && f.value.length) {
                        f.value.forEach(function(v) {
                            if (v.id && v.value != null) {
                                txt = txt.split(v.id).join("<b>" + v.value + "</b>");
                            }
                        });
                    }
                });
            }
            return txt.trim();
        }

        function classifyComm(c) {
            const txt = (c.commtxt || "").toLowerCase();
            if (c.eventtype === "WICKET") return "wicket";
            if (txt.indexOf(" six") !== -1 || txt.indexOf(" four") !== -1) return "boundary";
            return "";
        }

        // ============================================================
        // LOAD DATA
        // ============================================================
        function loadCricData() {
            cricFetch("/matches/v1/live").then(function(data) {
                const all = flattenMatches(data);
                const live = all.filter(isOngoing);

                if (live.length) {
                    cricMode = "live";
                    cricMatches = live.slice(0, 8);
                    startCricTicker();
                    return;
                }

                const cached = sessionStorage.getItem("cric_upcoming_cache");
                const cachedTime = Number(sessionStorage.getItem("cric_upcoming_cache_time") || 0);
                if (cached && (Date.now() - cachedTime < 6 * 60 * 60 * 1000)) {
                    cricMode = "upcoming";
                    cricMatches = JSON.parse(cached);
                    startCricTicker();
                    return;
                }

                cricFetch("/matches/v1/upcoming").then(function(upData) {
                    const upAll = flattenMatches(upData).filter(within10Days).slice(0, 10);
                    if (upAll.length) {
                        sessionStorage.setItem("cric_upcoming_cache", JSON.stringify(upAll));
                        sessionStorage.setItem("cric_upcoming_cache_time", String(Date.now()));
                        cricMode = "upcoming";
                        cricMatches = upAll;
                        startCricTicker();
                    } else {
                        document.getElementById("cricCard").innerHTML =
                            '<div style="text-align:center;padding:20px;color:var(--ink-faint);">No matches available right now.</div>';
                    }
                });
            });
        }

        // ============================================================
        // RENDER TICKER
        // ============================================================
        function startCricTicker() {
            cricIndex = 0;
            renderCricTicker();
            renderCricDots();
            renderMatchList();
            if (cricRotateTimer) clearInterval(cricRotateTimer);
            cricRotateTimer = setInterval(function() {
                if (cricPaused) return;
                cricIndex = (cricIndex + 1) % cricMatches.length;
                renderCricTicker();
                renderCricDots();
                markActiveListItem();
            }, 6000);
        }

        function renderMatchList() {
            const scroll = document.getElementById("cricMatchListScroll");
            if (!scroll) return;
            if (!cricMatches.length) { scroll.innerHTML =
                    '<div style="font-size:0.7rem;color:var(--ink-faint);padding:6px 0;">No matches</div>'; return; }
            scroll.innerHTML = "";
            cricMatches.forEach(function(m, i) {
                const mi = m.matchInfo;
                const item = document.createElement("div");
                item.className = "cric-matchlist-item" + (i === cricIndex ? " active" : "");
                item.setAttribute("data-i", i);
                const t1 = mi.team1.teamSName || mi.team1.teamName;
                const t2 = mi.team2.teamSName || mi.team2.teamName;
                const badgeClass = cricMode === "live" ? "live" : "upcoming";
                const badgeText = cricMode === "live" ? "🔴 " + (mi.matchFormat || "") : "📅 " + (mi.matchFormat || "");
                item.innerHTML =
                    "<span class='mli-badge " + badgeClass + "'>" + badgeText + "</span>" +
                    "<div class='mli-teams'>" + t1 + " vs " + t2 + "</div>" +
                    "<div class='mli-status'>" + (mi.status || mi.matchDesc || "") + "</div>";
                scroll.appendChild(item);
            });
        }

        function markActiveListItem() {
            const scroll = document.getElementById("cricMatchListScroll");
            if (!scroll) return;
            scroll.querySelectorAll(".cric-matchlist-item").forEach(function(el) {
                el.classList.toggle("active", Number(el.getAttribute("data-i")) === cricIndex);
            });
        }

        function renderCricDots() {
            const row = document.getElementById("cricDotsRow");
            if (!row) return;
            if (cricMatches.length <= 1) { row.innerHTML = ""; return; }
            row.innerHTML = cricMatches.map(function(_, i) {
                return '<span class="cric-dot' + (i === cricIndex ? ' active' : '') + '" data-i="' + i + '"></span>';
            }).join("") + '<span class="cric-count-label">' + (cricIndex + 1) + '/' + cricMatches.length + '</span>';
        }

        function goToCric(i) {
            cricIndex = (i + cricMatches.length) % cricMatches.length;
            renderCricTicker();
            renderCricDots();
            markActiveListItem();
            // Close open cards
            document.getElementById("cricCommCard").classList.remove("open");
            document.getElementById("cricScCard").classList.remove("open");
            if (commRefreshTimer) { clearInterval(commRefreshTimer);
                commRefreshTimer = null; }
        }

        function renderCricTicker() {
            const m = cricMatches[cricIndex];
            const card = document.getElementById("cricCard");
            if (!m || !card) return;
            const mi = m.matchInfo;

            function teamRow(teamObj, scoreObj) {
                let scoreHtml = "<span>Yet to bat</span>";
                if (scoreObj) {
                    const inns = Object.keys(scoreObj);
                    scoreHtml = inns.map(function(inn) {
                        const s = scoreObj[inn];
                        return s.runs + "/" + s.wickets + " <span>(" + s.overs + " ov)</span>";
                    }).join(" & ");
                }
                return '<div class="cric-team-row">' +
                    '<div class="cric-team-left"><div class="cric-team-flag">' + initials(teamObj) + '</div>' +
                    '<div class="cric-team-name">' + teamObj.teamName + '</div></div>' +
                    '<div class="cric-team-score">' + scoreHtml + '</div></div>';
            }

            if (cricMode === "live") {
                const ms = m.matchScore || {};
                card.innerHTML =
                    '<div class="cric-card-head">' +
                    '<span class="cric-card-desc">' + (mi.matchDesc || "") + " · " + (mi.seriesName || "") +
                    '</span>' +
                    '<span class="cric-card-badge live"><span class="dot"></span>' + (mi.matchFormat || "") +
                    '</span>' +
                    '</div>' +
                    teamRow(mi.team1, ms.team1Score) +
                    teamRow(mi.team2, ms.team2Score) +
                    '<div class="cric-card-status">' + (mi.status || "") + '</div>';
            } else {
                const start = Number(mi.startDate);
                const dateStr = start ? new Date(start).toLocaleString('en-GB', { day: '2-digit', month: 'short',
                    hour: '2-digit', minute: '2-digit' }) : "";
                const place = mi.venueInfo ? mi.venueInfo.ground + ", " + mi.venueInfo.city : "";
                card.innerHTML =
                    '<div class="cric-card-head">' +
                    '<span class="cric-card-desc">' + (mi.matchDesc || "") + " · " + (mi.seriesName || "") +
                    '</span>' +
                    '<span class="cric-card-badge upcoming">' + (mi.matchFormat || "") + '</span>' +
                    '</div>' +
                    teamRow(mi.team1, null) +
                    teamRow(mi.team2, null) +
                    '<div class="cric-card-status upcoming-status">📅 ' + dateStr + ' · 📍 ' + place + '</div>';
            }
        }

        // ============================================================
        // COMMENTARY
        // ============================================================
        function renderCommList(items, append) {
            const list = document.getElementById("cricCommList");
            if (!list) return;
            if (!append) list.innerHTML = "";
            if (!items || !items.length) {
                if (!append) list.innerHTML =
                    "<div style='padding:10px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Commentary abhi available nahi.</div>";
                return;
            }
            const frag = document.createDocumentFragment();
            items.forEach(function(wrap) {
                const c = wrap.commentary;
                if (!c || !c.commtxt) return;
                const div = document.createElement("div");
                const cls = classifyComm(c);
                div.className = "cric-comm-item" + (cls ? " " + cls : "");
                const overLabel = c.overnum ? c.overnum + " ov" : "";
                div.innerHTML = "<span class='cco-over'>" + overLabel + "</span>" + formatCommText(c);
                frag.appendChild(div);
            });
            if (append) list.insertBefore(frag, list.firstChild);
            else list.appendChild(frag);
        }

        function fetchCommentary(matchId, isRefresh) {
            cricFetch("/mcenter/v1/" + matchId + "/comm").then(function(data) {
                if (!data || !data.comwrapper) return;
                const items = data.comwrapper;
                if (isRefresh) {
                    const newItems = [];
                    for (var i = 0; i < items.length; i++) {
                        const bn = items[i].commentary && items[i].commentary.ballnbr;
                        if (commLastBallNbr != null && bn <= commLastBallNbr) break;
                        newItems.push(items[i]);
                    }
                    if (newItems.length) renderCommList(newItems, true);
                } else {
                    renderCommList(items, false);
                }
                if (items[0] && items[0].commentary) {
                    commLastBallNbr = items[0].commentary.ballnbr || commLastBallNbr;
                }
                const tag = document.getElementById("cricCommLiveTag");
                if (tag) tag.textContent = "Last updated: " + new Date().toLocaleTimeString();
            }).catch(function() {
                if (!isRefresh) renderCommList(null, false);
            });
        }

        function toggleCommentary() {
            const card = document.getElementById("cricCommCard");
            const scCard = document.getElementById("cricScCard");
            if (!card) return;
            const willOpen = !card.classList.contains("open");
            if (scCard) scCard.classList.remove("open");
            card.classList.toggle("open", willOpen);
            if (!willOpen) {
                if (commRefreshTimer) { clearInterval(commRefreshTimer);
                    commRefreshTimer = null; }
                return;
            }
            const matchId = getCurrentMatchId();
            if (!matchId) return;
            const m = cricMatches[cricIndex];
            document.getElementById("cricCommTitle").textContent = matchTitle(m);
            commLastBallNbr = null;
            document.getElementById("cricCommList").textContent = "Loading…";
            fetchCommentary(matchId, false);
            if (commRefreshTimer) clearInterval(commRefreshTimer);
            commRefreshTimer = setInterval(function() {
                if (cricMode === "live") fetchCommentary(matchId, true);
            }, 60000);
        }

        function closeCommentaryCard() {
            const card = document.getElementById("cricCommCard");
            if (card) card.classList.remove("open");
            if (commRefreshTimer) { clearInterval(commRefreshTimer);
                commRefreshTimer = null; }
        }

        // ============================================================
        // SCORECARD
        // ============================================================
        function renderBattingTable(inn) {
            const bat = (inn.batsman || []);
            let rows = bat.map(function(b) {
                const dismissal = b.outdec || "not out";
                return "<tr><td class='name-col'>" + (b.name || "") +
                    (b.iscaptain ? " (c)" : "") + (b.iskeeper ? " †" : "") +
                    "<div class='dismissal'>" + dismissal + "</div></td>" +
                    "<td>" + (b.runs != null ? b.runs : "-") + "</td>" +
                    "<td>" + (b.balls != null ? b.balls : "-") + "</td>" +
                    "<td>" + (b.fours != null ? b.fours : "-") + "</td>" +
                    "<td>" + (b.sixes != null ? b.sixes : "-") + "</td>" +
                    "<td>" + (b.strkrate || "-") + "</td></tr>";
            }).join("");
            return "<div class='cric-sc-table-wrap'><table class='cric-sc-table'>" +
                "<tr><th class='name-col'>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr>" +
                rows + "</table></div>";
        }

        function renderBowlingTable(inn) {
            const bowl = (inn.bowler || []);
            let rows = bowl.map(function(b) {
                return "<tr><td class='name-col'>" + (b.name || "") + "</td>" +
                    "<td>" + (b.overs != null ? b.overs : "-") + "</td>" +
                    "<td>" + (b.maidens != null ? b.maidens : "-") + "</td>" +
                    "<td>" + (b.runs != null ? b.runs : "-") + "</td>" +
                    "<td>" + (b.wickets != null ? b.wickets : "-") + "</td>" +
                    "<td>" + (b.economy || "-") + "</td></tr>";
            }).join("");
            return "<div class='cric-sc-table-wrap'><table class='cric-sc-table'>" +
                "<tr><th class='name-col'>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr>" +
                rows + "</table></div>";
        }

        function renderScInnings(idx) {
            const body = document.getElementById("cricScBody");
            if (!body || !scInningsData[idx]) { body.innerHTML =
                    "<div style='padding:10px;color:var(--ink-faint);font-size:0.72rem;'>Data available nahi.</div>"; return; }
            const inn = scInningsData[idx];
            const extras = inn.extras || {};
            const extrasTotal = extras.total != null ? extras.total :
                ((extras.wides || 0) + (extras.noballs || 0) + (extras.byes || 0) + (extras.legbyes || 0));
            body.innerHTML =
                "<div class='cric-sc-section-title'>Batting</div>" +
                renderBattingTable(inn) +
                "<div class='cric-sc-extras'>Extras: " + extrasTotal + "</div>" +
                "<div class='cric-sc-total'>Total: " + (inn.score != null ? inn.score : "-") +
                "/" + (inn.wickets != null ? inn.wickets : "-") +
                " (" + (inn.overs != null ? inn.overs : "-") + " ov)</div>" +
                "<div class='cric-sc-section-title'>Bowling</div>" +
                renderBowlingTable(inn);
        }

        function renderScTabs() {
            const tabs = document.getElementById("cricScTabs");
            if (!tabs) return;
            tabs.innerHTML = scInningsData.map(function(inn, i) {
                const label = inn.batteamsname || inn.batteamname || ("Innings " + (i + 1));
                return "<button class='cric-sc-tab" + (i === scActiveIdx ? " active" : "") +
                    "' data-i='" + i + "'>" + label + "</button>";
            }).join("");
        }

        function fetchScorecard(matchId) {
            cricFetch("/mcenter/v1/" + matchId + "/hscard").then(function(data) {
                if (!data || !data.scorecard || !data.scorecard.length) {
                    document.getElementById("cricScBody").innerHTML =
                        "<div style='padding:10px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Scorecard abhi available nahi.</div>";
                    return;
                }
                scInningsData = data.scorecard;
                scActiveIdx = scInningsData.length - 1;
                renderScTabs();
                renderScInnings(scActiveIdx);
            }).catch(function() {
                document.getElementById("cricScBody").innerHTML =
                    "<div style='padding:10px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Load nahi ho saka.</div>";
            });
        }

        function toggleScorecard() {
            const card = document.getElementById("cricScCard");
            const commCard = document.getElementById("cricCommCard");
            if (!card) return;
            const willOpen = !card.classList.contains("open");
            if (commCard) commCard.classList.remove("open");
            if (commRefreshTimer) { clearInterval(commRefreshTimer);
                commRefreshTimer = null; }
            card.classList.toggle("open", willOpen);
            if (!willOpen) return;
            const matchId = getCurrentMatchId();
            if (!matchId) return;
            const m = cricMatches[cricIndex];
            document.getElementById("cricScTitle").textContent = matchTitle(m);
            document.getElementById("cricScTabs").innerHTML = "";
            document.getElementById("cricScBody").textContent = "Loading…";
            fetchScorecard(matchId);
        }

        function closeScorecardCard() {
            const card = document.getElementById("cricScCard");
            if (card) card.classList.remove("open");
        }

        // ============================================================
        // DETAIL OVERLAY
        // ============================================================
        function openCricDetail(m) {
            const overlay = document.getElementById("cricOverlay");
            const body = document.getElementById("cricScorecardBody");
            if (!overlay || !body) return;
            const mi = m.matchInfo;
            let html = "<h3>" + matchTitle(m) + "</h3>";
            html += "<span class='cric-sc-live'" + (cricMode === "upcoming" ?
                " style='color:var(--gold);background:var(--gold-light);'" : "") + ">" +
                (cricMode === "live" ? "Live" : "Upcoming") + "</span>";
            html += "<div class='cric-sc-update'>" + (mi.status || "") + "</div>";
            if (cricMode === "live" && m.matchScore) {
                html += "<table class='cric-sc-table'><tr><th>Team</th><th>Score</th></tr>";
                ["team1Score", "team2Score"].forEach(function(key) {
                    const teamScore = m.matchScore[key];
                    const teamObj = key === "team1Score" ? mi.team1 : mi.team2;
                    if (teamScore) {
                        Object.keys(teamScore).forEach(function(inn) {
                            const s = teamScore[inn];
                            html += "<tr><td>" + teamObj.teamName + "</td><td>" + s.runs + "/" + s
                                .wickets + " (" + s.overs + " ov)</td></tr>";
                        });
                    }
                });
                html += "</table>";
            }
            if (mi.venueInfo) {
                html += "<div class='cric-sc-update'>📍 " + mi.venueInfo.ground + ", " + mi.venueInfo.city +
                    "</div>";
            }
            if (cricMode === "upcoming") {
                const start = Number(mi.startDate);
                html += "<div class='cric-sc-update'>📅 " + (start ? new Date(start).toString() : "") + "</div>";
            }
            body.innerHTML = html;
            overlay.classList.add("open");
        }

        // ============================================================
        // EVENT BINDINGS
        // ============================================================
        document.addEventListener("DOMContentLoaded", function() {

            // Load data
            loadCricData();
            setInterval(loadCricData, 15 * 60 * 1000);

            // Card click → detail
            document.getElementById("cricCard").addEventListener("click", function() {
                const m = cricMatches[cricIndex];
                if (m) openCricDetail(m);
            });

            // Prev / Next
            document.getElementById("cricPrevBtn").addEventListener("click", function() { goToCric(cricIndex -
                1); });
            document.getElementById("cricNextBtn").addEventListener("click", function() { goToCric(cricIndex +
                1); });

            // Pause on hover
            const bar = document.getElementById("cricTickerBar");
            if (bar) {
                bar.addEventListener("mouseenter", function() { cricPaused = true; });
                bar.addEventListener("mouseleave", function() { cricPaused = false; });
            }

            // Match list click
            document.getElementById("cricMatchListScroll").addEventListener("click", function(e) {
                const item = e.target.closest(".cric-matchlist-item");
                if (!item) return;
                goToCric(Number(item.getAttribute("data-i")));
                document.getElementById("cricCommCard").classList.remove("open");
                document.getElementById("cricScCard").classList.remove("open");
            });

            // Dots click
            document.getElementById("cricDotsRow").addEventListener("click", function(e) {
                const dot = e.target.closest(".cric-dot");
                if (dot) goToCric(Number(dot.getAttribute("data-i")));
            });

            // Commentary
            document.getElementById("cricCommBtn").addEventListener("click", toggleCommentary);
            document.getElementById("cricCommCardClose").addEventListener("click", closeCommentaryCard);

            // Scorecard
            document.getElementById("cricScBtn").addEventListener("click", toggleScorecard);
            document.getElementById("cricScCardClose").addEventListener("click", closeScorecardCard);

            // Scorecard tabs
            document.getElementById("cricScTabs").addEventListener("click", function(e) {
                const tab = e.target.closest(".cric-sc-tab");
                if (!tab) return;
                scActiveIdx = Number(tab.getAttribute("data-i"));
                renderScTabs();
                renderScInnings(scActiveIdx);
            });

            // Overlay close
            document.getElementById("cricClose").addEventListener("click", function() {
                document.getElementById("cricOverlay").classList.remove("open");
            });
            document.getElementById("cricOverlay").addEventListener("click", function(e) {
                if (e.target === this) this.classList.remove("open");
            });

            // Burger menu
            document.getElementById("burgerBtn").addEventListener("click", function() {
                document.getElementById("mobilePanel").classList.toggle("open");
            });
        });
    </script>
</body>
</html>
