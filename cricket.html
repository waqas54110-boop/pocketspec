<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏏 Cricket Live — pocketspec</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           RESET & BASE — Premium White Theme
           ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            width: 100%;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }
        ::selection {
            background: #01411C;
            color: #fff;
        }

        /* ============================================================
           COLOR PALETTE
           ============================================================ */
        :root {
            --green: #01411C;
            --green-light: #e8f5ee;
            --green-glow: rgba(1, 65, 28, 0.08);
            --gold: #d4a02b;
            --gold-light: #fdf3d5;
            --gold-glow: rgba(212, 160, 43, 0.12);
            --ink: #1a1a2e;
            --ink-soft: #4a4a6a;
            --ink-faint: #8e8ea0;
            --surface: #ffffff;
            --surface-2: #f6f7f9;
            --line: #eaeaef;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 16px 56px rgba(0, 0, 0, 0.08);
            --shadow-xl: 0 24px 80px rgba(0, 0, 0, 0.10);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --display: 'Space Grotesk', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface-2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: var(--radius-full);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        header {
            position: sticky;
            top: 0;
            z-index: 60;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--line);
            width: 100%;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
            padding: 0 24px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            gap: 20px;
        }
        .logo {
            font-family: var(--display);
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.02em;
            color: var(--green);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logo span {
            font-family: var(--mono);
            font-size: 0.5rem;
            font-weight: 500;
            color: var(--ink-soft);
            background: var(--surface-2);
            padding: 1px 8px;
            border-radius: var(--radius-full);
            letter-spacing: 0.04em;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--ink-soft);
            flex: 1;
            justify-content: center;
        }
        .nav-links a {
            transition: color 0.2s var(--ease);
            position: relative;
            padding: 4px 0;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0;
            height: 2.5px;
            background: var(--green);
            transition: width 0.25s var(--ease);
            border-radius: 2px;
        }
        .nav-links a:hover {
            color: var(--ink);
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-links a.active {
            color: var(--green);
            font-weight: 700;
        }
        .nav-links a.active::after {
            width: 100%;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .nav-quiz-btn {
            font-weight: 600;
            font-size: 0.72rem;
            background: var(--gold);
            color: #1a1a2e;
            padding: 7px 18px;
            border-radius: var(--radius-full);
            transition: all 0.2s var(--ease);
            box-shadow: 0 2px 12px var(--gold-glow);
            flex-shrink: 0;
            white-space: nowrap;
            border: none;
            cursor: pointer;
        }
        .nav-quiz-btn:hover {
            background: #b88a20;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--gold-glow);
        }
        .burger {
            display: none;
            width: 38px;
            height: 38px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: var(--surface);
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .burger span,
        .burger span::before,
        .burger span::after {
            content: '';
            display: block;
            width: 17px;
            height: 2px;
            background: var(--ink);
            position: relative;
            transition: all 0.2s;
        }
        .burger span::before {
            content: '';
            position: absolute;
            top: -5px;
            width: 17px;
            height: 2px;
            background: var(--ink);
        }
        .burger span::after {
            content: '';
            position: absolute;
            top: 5px;
            width: 17px;
            height: 2px;
            background: var(--ink);
        }
        .mobile-panel {
            display: none;
            width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--line);
            padding: 12px 24px 20px;
            flex-direction: column;
            gap: 4px;
        }
        .mobile-panel.open {
            display: flex;
        }
        .mobile-panel a {
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--ink-soft);
            border-bottom: 1px solid var(--line);
        }
        .mobile-panel a:last-child {
            border-bottom: none;
        }
        .mobile-panel a.active {
            color: var(--green);
        }

        /* ============================================================
           HERO BANNER — Full-Image Slideshow
           ============================================================ */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
            background: #0b1120;
            border-bottom: 1px solid var(--line);
        }
        .hero-slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.7s var(--ease);
        }
        .hero-slide {
            flex: 0 0 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        /* Optional dark overlay for better text readability (if you add text) */
        .hero-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2); /* subtle darkening */
            pointer-events: none;
        }

        /* If you want to show a small text overlay, uncomment below */
        /*
        .hero-slide .slide-label {
            position: absolute;
            bottom: 40px;
            left: 40px;
            z-index: 5;
            color: #fff;
            font-family: var(--display);
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: -0.02em;
        }
        .hero-slide .slide-label small {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.8;
        }
        */

        /* Dots */
        .banner-dots {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 12px;
        }
        .banner-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s var(--ease);
            padding: 0;
        }
        .banner-dot.active {
            background: var(--gold);
            border-color: var(--gold);
            transform: scale(1.25);
            box-shadow: 0 0 24px rgba(212, 160, 43, 0.4);
        }
        .banner-dot:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Arrows */
        .banner-arrows {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            z-index: 15;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
        }
        .banner-arrow {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.25s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .banner-arrow:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.08);
            border-color: var(--gold);
        }

        /* ============================================================
           MATCH LIST & TICKER (same as before)
           ============================================================ */
        .cric-matchlist-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            width: 100%;
            padding: 14px 0;
        }
        .cric-matchlist-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .cric-matchlist-title {
            font-family: var(--mono);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-faint);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cric-matchlist-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }
        .cric-matchlist-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 6px;
        }
        .cric-matchlist-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .cric-matchlist-item {
            flex: 0 0 auto;
            min-width: 200px;
            max-width: 200px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.25s var(--ease);
            box-shadow: var(--shadow-sm);
        }
        .cric-matchlist-item:hover {
            border-color: var(--green);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .cric-matchlist-item.active {
            border-color: var(--green);
            background: var(--green-light);
            box-shadow: 0 4px 20px var(--green-glow);
        }
        .cric-matchlist-item .mli-badge {
            font-family: var(--mono);
            font-size: 0.5rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            display: inline-block;
            margin-bottom: 4px;
        }
        .cric-matchlist-item .mli-badge.live {
            background: #fdeaea;
            color: #e5484d;
        }
        .cric-matchlist-item .mli-badge.upcoming {
            background: var(--gold-light);
            color: var(--gold);
        }
        .cric-matchlist-item .mli-teams {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cric-matchlist-item .mli-status {
            font-size: 0.6rem;
            color: var(--ink-faint);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cric-ticker-section {
            padding: 32px 0 40px;
        }
        .cric-card-outer {
            max-width: 540px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cric-nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--line);
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s var(--ease);
            font-size: 1.1rem;
            box-shadow: var(--shadow-sm);
        }
        .cric-nav-btn:hover {
            border-color: var(--green);
            color: var(--green);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .cric-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .cric-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px 24px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        .cric-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(1, 65, 28, 0.01), rgba(212, 160, 43, 0.01));
            pointer-events: none;
        }
        .cric-card:hover {
            transform: translateY(-6px);
            border-color: var(--green);
            box-shadow: var(--shadow-lg);
        }
        .cric-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }
        .cric-card-desc {
            font-size: 0.7rem;
            color: var(--ink-faint);
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 280px;
        }
        .cric-card-badge {
            font-family: var(--mono);
            font-size: 0.55rem;
            font-weight: 700;
            padding: 3px 14px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            white-space: nowrap;
        }
        .cric-card-badge.live {
            background: #fdeaea;
            color: #e5484d;
        }
        .cric-card-badge.live .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #e5484d;
            margin-right: 6px;
            animation: cricPulse 1.2s infinite;
        }
        .cric-card-badge.upcoming {
            background: var(--gold-light);
            color: var(--gold);
        }

        .cric-team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 5px 0;
        }
        .cric-team-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .cric-team-flag {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--green);
            color: #fff;
            font-family: var(--display);
            font-weight: 800;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .cric-team-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cric-team-score {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--ink);
            flex-shrink: 0;
            text-align: right;
            white-space: nowrap;
        }
        .cric-team-score span {
            color: var(--ink-faint);
            font-weight: 500;
            font-size: 0.7rem;
        }
        .cric-card-status {
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--line);
            color: var(--green);
        }
        .cric-card-status.upcoming-status {
            color: var(--gold);
        }

        .cric-dots-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
        }
        .cric-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--line);
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .cric-dot.active {
            background: var(--green);
            transform: scale(1.4);
            box-shadow: 0 0 16px var(--green-glow);
        }
        .cric-count-label {
            font-family: var(--mono);
            font-size: 0.5rem;
            color: var(--ink-faint);
            margin-left: 8px;
        }

        .cric-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            max-width: 540px;
            margin-left: auto;
            margin-right: auto;
        }
        .cric-comm-btn,
        .cric-sc-btn {
            flex: 1;
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 9px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--ink-soft);
            cursor: pointer;
            transition: all 0.25s var(--ease);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .cric-comm-btn:hover {
            border-color: var(--green);
            color: var(--green);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            background: var(--green-light);
        }
        .cric-sc-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            background: var(--gold-light);
        }

        .cric-comm-card,
        .cric-sc-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-top: 16px;
            max-width: 540px;
            margin-left: auto;
            margin-right: auto;
            display: none;
            box-shadow: var(--shadow-sm);
        }
        .cric-comm-card.open,
        .cric-sc-card.open {
            display: block;
            animation: fadeUp 0.35s var(--ease);
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .cric-comm-card-head,
        .cric-sc-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
        }
        .cric-comm-card-title,
        .cric-sc-card-title {
            font-family: var(--display);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .cric-card-close-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink-soft);
            font-size: 0.75rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .cric-card-close-btn:hover {
            border-color: #e5484d;
            color: #e5484d;
            background: #fdeaea;
        }

        .cric-comm-list {
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }
        .cric-comm-item {
            background: var(--surface-2);
            border-left: 3px solid var(--line);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--ink-soft);
        }
        .cric-comm-item .cco-over {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--ink-faint);
            margin-right: 8px;
        }
        .cric-comm-item.wicket {
            border-left-color: #e5484d;
            background: #fdeaea;
            color: var(--ink);
            font-weight: 600;
        }
        .cric-comm-item.boundary {
            border-left-color: var(--gold);
            background: var(--gold-light);
            color: var(--ink);
            font-weight: 600;
        }
        .cric-comm-item b {
            color: var(--ink);
        }
        .cric-comm-live-tag {
            font-family: var(--mono);
            font-size: 0.55rem;
            color: var(--ink-faint);
            text-align: center;
            margin-top: 10px;
        }

        .cric-sc-innings-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .cric-sc-tab {
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--ink-soft);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .cric-sc-tab.active {
            background: var(--green);
            border-color: var(--green);
            color: #fff;

    <script>
        // ===== BANNER SLIDESHOW =====
        (function() {
            const slides = document.getElementById('heroSlides');
            const dotsContainer = document.getElementById('bannerDots');
            const prevBtn = document.getElementById('bannerPrev');
            const nextBtn = document.getElementById('bannerNext');
            const total = slides ? slides.children.length : 0;
            let current = 0, interval = null, transitioning = false;

            if (!slides || total === 0) return;

            for (let i = 0; i < total; i++) {
                const dot = document.createElement('button');
                dot.className = 'banner-dot' + (i === 0 ? ' active' : '');
                dot.dataset.index = i;
                dot.addEventListener('click', () => goTo(Number(dot.dataset.index)));
                dotsContainer.appendChild(dot);
            }

            function goTo(index) {
                if (transitioning || index === current) return;
                transitioning = true;
                current = index;
                slides.style.transform = 'translateX(-' + (current * 100) + '%)';
                updateDots();
                resetAuto();
                setTimeout(() => transitioning = false, 700);
            }

            function updateDots() {
                dotsContainer.querySelectorAll('.banner-dot').forEach((d, i) => {
                    d.classList.toggle('active', i === current);
                });
            }

            function next() { goTo((current + 1) % total); }
            function prev() { goTo((current - 1 + total) % total); }

            function resetAuto() {
                if (interval) clearInterval(interval);
                interval = setInterval(next, 5000);
            }

            nextBtn.addEventListener('click', e => { e.stopPropagation(); next(); });
            prevBtn.addEventListener('click', e => { e.stopPropagation(); prev(); });

            const banner = document.getElementById('heroBanner');
            banner.addEventListener('mouseenter', () => { if (interval) clearInterval(interval); });
            banner.addEventListener('mouseleave', resetAuto);

            let touchStartX = 0;
            banner.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
            banner.addEventListener('touchend', e => {
                const diff = touchStartX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
            }, { passive: true });

            resetAuto();
        })();

        // ===== TOAST =====

            const stack = document.getElementById('toastStack');
            if (!stack) return;
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            stack.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 2400);
        }

        body.innerHTML = "<div style='padding:14px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Squad abhi announce nahi hui.</div>";
        return;
    }
    let html = "";
    data.player.forEach(group => {
        const label = (group.category || "").toLowerCase().indexOf("bench") !== -1 ? "🪑 Bench" : "🏏 Playing XI";
        html += "<div class='cric-squad-group-title'>" + label + "</div><div class='cric-squad-grid'>";
        (group.player || []).forEach(p => {
            html +=
                "<div class='cric-squad-chip'>" +
                "<div class='csc-avatar'>" + playerInitials(p.name) + "</div>" +
                "<div class='csc-info'>" +
                "<div class='csc-name'>" + p.name +
                (p.captain ? "<span class='csc-tag cap'>C</span>" : "") +
                (p.keeper ? "<span class='csc-tag wk'>WK</span>" : "") +
                "</div>" +
                "<div class='csc-role'>" + roleShort(p.role) + "</div>" +
                "</div></div>";
        });
        html += "</div>";
    });
    body.innerHTML = html;
}

function loadSquad(matchId, teamId) {
    const body = document.getElementById("cricSquadBody");
    if (!matchId || !teamId) { if (body) body.innerHTML = "<div style='padding:14px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Squad abhi available nahi.</div>"; return; }
    if (body) body.textContent = "Loading…";
    const cacheKey = matchId + "_" + teamId;
    if (squadCache[cacheKey]) { renderSquadBody(squadCache[cacheKey]); return; }
    cricFetch("/mcenter/v1/" + matchId + "/team/" + teamId).then(data => {
        squadCache[cacheKey] = data;
        renderSquadBody(data);
    }).catch(() => {
        if (body) body.innerHTML = "<div style='padding:14px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Load nahi ho saka.</div>";
    });
}

function refreshSquadSection() {

    const wrap = document.getElementById("cricSquadWrap");
    if (!m || !wrap) return;

        function flattenMatches(data) {
            let all = [];
            if (!data || !data.typeMatches) return all;
            data.typeMatches.forEach(tm => {
                (tm.seriesMatches || []).forEach(sm => {
                    const w = sm.seriesAdWrapper;
                    if (w && w.matches) w.matches.forEach(m => all.push(m));
                });
            });
            return all;
        }

        function isOngoing(m) {
            const st = m.matchInfo && m.matchInfo.state;
            const dead = ["Complete", "Abandoned", "Cancelled", "Preview", "Not Started"];
            return st && dead.indexOf(st) === -1;
        }

        function within10Days(m) {
            const start = Number(m.matchInfo && m.matchInfo.startDate);
            if (!start) return true;
            const diff = (start - Date.now()) / (1000 * 60 * 60 * 24);
            return diff >= -1 && diff <= 10;
        }

        function getCurrentMatchId() {
            const m = cricMatches[cricIndex];
            return m && m.matchInfo ? m.matchInfo.matchId : null;
        }

        function matchTitle(m) {
            const mi = m.matchInfo;
            return (mi.team1.teamSName || mi.team1.teamName) + " vs " + (mi.team2.teamSName || mi.team2.teamName) +
                " · " + (mi.matchDesc || "");
        }

        function initials(team) {
            return (team.teamSName || team.teamName || "??").slice(0, 3).toUpperCase();
        }

        function formatCommText(c) {
            let txt = c.commtxt || "";
            const formats = c.commentaryformats;
            if (formats && formats.length) {
                formats.forEach(f => {
                    if (f.type === "bold" && f.value && f.value.length) {
                        f.value.forEach(v => {
                            if (v.id && v.value != null) {
                                txt = txt.split(v.id).join("<b>" + v.value + "</b>");
                            }
                        });
                    }
                });
            }
            return txt.trim();
        }

        function classifyComm(c) {
            const txt = (c.commtxt || "").toLowerCase();
            if (c.eventtype === "WICKET") return "wicket";
            if (txt.indexOf(" six") !== -1 || txt.indexOf(" four") !== -1) return "boundary";
            return "";
        }

        function loadCricData() {
            cricFetch("/matches/v1/live").then(data => {
                const all = flattenMatches(data);
                const live = all.filter(isOngoing);
                if (live.length) { cricMode = "live"; cricMatches = live.slice(0, 8); startCricTicker(); return; }

                const cached = sessionStorage.getItem("cric_upcoming_cache");
                const cachedTime = Number(sessionStorage.getItem("cric_upcoming_cache_time") || 0);
                if (cached && (Date.now() - cachedTime < 6 * 60 * 60 * 1000)) {
                    cricMode = "upcoming";
                    cricMatches = JSON.parse(cached);
                    startCricTicker();
                    return;
                }

                cricFetch("/matches/v1/upcoming").then(upData => {
                    const upAll = flattenMatches(upData).filter(within10Days).slice(0, 10);
                    if (upAll.length) {
                        sessionStorage.setItem("cric_upcoming_cache", JSON.stringify(upAll));
                        sessionStorage.setItem("cric_upcoming_cache_time", String(Date.now()));
                        cricMode = "upcoming";
                        cricMatches = upAll;
                        startCricTicker();
                    } else {
                        document.getElementById("cricCard").innerHTML =
                            '<div style="text-align:center;padding:20px;color:var(--ink-faint);">No matches available.</div>';
                    }
                });
            });
        }

        function startCricTicker() {
            cricIndex = 0;
            renderCricTicker();
            renderCricDots();
            renderMatchList();
            if (cricRotateTimer) clearInterval(cricRotateTimer);
            cricRotateTimer = setInterval(() => {
                if (cricPaused) return;
                cricIndex = (cricIndex + 1) % cricMatches.length;
                renderCricTicker();
                renderCricDots();
                markActiveListItem();
            }, 6000);
        }

        function renderMatchList() {
            const scroll = document.getElementById("cricMatchListScroll");
            if (!scroll) return;
            if (!cricMatches.length) { scroll.innerHTML = '<div style="font-size:0.7rem;color:var(--ink-faint);padding:6px 0;">No matches</div>'; return; }
            scroll.innerHTML = "";
            cricMatches.forEach((m, i) => {
                const mi = m.matchInfo;
                const item = document.createElement("div");
                item.className = "cric-matchlist-item" + (i === cricIndex ? " active" : "");
                item.dataset.i = i;
                const t1 = mi.team1.teamSName || mi.team1.teamName;
                const t2 = mi.team2.teamSName || mi.team2.teamName;
                const badgeClass = cricMode === "live" ? "live" : "upcoming";
                const badgeText = cricMode === "live" ? "🔴 " + (mi.matchFormat || "") : "📅 " + (mi.matchFormat || "");
                item.innerHTML =
                    "<span class='mli-badge " + badgeClass + "'>" + badgeText + "</span>" +
                    "<div class='mli-teams'>" + t1 + " vs " + t2 + "</div>" +
                    "<div class='mli-status'>" + (mi.status || mi.matchDesc || "") + "</div>";
                scroll.appendChild(item);
            });
        }

        function markActiveListItem() {
            const scroll = document.getElementById("cricMatchListScroll");
            if (!scroll) return;
            scroll.querySelectorAll(".cric-matchlist-item").forEach(el => {
                el.classList.toggle("active", Number(el.dataset.i) === cricIndex);
            });
        }

        function renderCricDots() {
            const row = document.getElementById("cricDotsRow");
            if (!row) return;
            if (cricMatches.length <= 1) { row.innerHTML = ""; return; }
            row.innerHTML = cricMatches.map((_, i) =>
                '<span class="cric-dot' + (i === cricIndex ? ' active' : '') + '" data-i="' + i + '"></span>'
            ).join("") + '<span class="cric-count-label">' + (cricIndex + 1) + '/' + cricMatches.length + '</span>';
        }

        function goToCric(i) {
            cricIndex = (i + cricMatches.length) % cricMatches.length;
            renderCricTicker();
            squadActiveTeam = 1;
            renderCricDots();
            markActiveListItem();
            document.getElementById("cricCommCard").classList.remove("open");
            document.getElementById("cricScCard").classList.remove("open");
            document.getElementById("cricSquadCard").classList.remove("open");
            if (commRefreshTimer) { clearInterval(commRefreshTimer); commRefreshTimer = null; }
        }

        function renderCricTicker() {
            const m = cricMatches[cricIndex];
            const card = document.getElementById("cricCard");
            if (!m || !card) return;
            const mi = m.matchInfo;

            function teamRow(teamObj, scoreObj) {
                let scoreHtml = "<span>Yet to bat</span>";
                if (scoreObj) {
                    const inns = Object.keys(scoreObj);
                    scoreHtml = inns.map(inn => {
                        const s = scoreObj[inn];
                        return s.runs + "/" + s.wickets + " <span>(" + s.overs + " ov)</span>";
                    }).join(" & ");
                }
                return '<div class="cric-team-row">' +
                    '<div class="cric-team-left"><div class="cric-team-flag">' + initials(teamObj) + '</div>' +
                    '<div class="cric-team-name">' + teamObj.teamName + '</div></div>' +
                    '<div class="cric-team-score">' + scoreHtml + '</div></div>';
                
            }

            if (cricMode === "live") {
                const ms = m.matchScore || {};
                card.innerHTML =
                    '<div class="cric-card-head">' +
                    '<span class="cric-card-desc">' + (mi.matchDesc || "") + " · " + (mi.seriesName || "") + '</span>' +
                    '<span class="cric-card-badge live"><span class="dot"></span>' + (mi.matchFormat || "") + '</span>' +
                    '</div>' +
                    teamRow(mi.team1, ms.team1Score) +
                    teamRow(mi.team2, ms.team2Score) +
                    '<div class="cric-card-status">' + (mi.status || "") + '</div>';
            } else {
                const start = Number(mi.startDate);
                const dateStr = start ? new Date(start).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : "";
                const place = mi.venueInfo ? mi.venueInfo.ground + ", " + mi.venueInfo.city : "";
                card.innerHTML =
                    '<div class="cric-card-head">' +
                    '<span class="cric-card-desc">' + (mi.matchDesc || "") + " · " + (mi.seriesName || "") + '</span>' +
                    '<span class="cric-card-badge upcoming">' + (mi.matchFormat || "") + '</span>' +
                    '</div>' +
                    teamRow(mi.team1, null) +
                    teamRow(mi.team2, null) +
                    '<div class="cric-card-status upcoming-status">📅 ' + dateStr + ' · 📍 ' + place + '</div>';
            }
                   refreshSquadSection();
        }

        // === COMMENTARY ===
        function fetchCommentary(matchId, isRefresh) {
            cricFetch("/mcenter/v1/" + matchId + "/comm").then(data => {
                if (!data || !data.comwrapper) return;
                const items = data.comwrapper;
                if (isRefresh) {
                    const newItems = [];
                    for (let i = 0; i < items.length; i++) {
                        const bn = items[i].commentary && items[i].commentary.ballnbr;
                        if (commLastBallNbr != null && bn <= commLastBallNbr) break;
                        newItems.push(items[i]);
                    }
                    if (newItems.length) renderCommList(newItems, true);
                } else {
                    renderCommList(items, false);
                }
                if (items[0] && items[0].commentary) {
                    commLastBallNbr = items[0].commentary.ballnbr || commLastBallNbr;
                }
                const tag = document.getElementById("cricCommLiveTag");
                if (tag) tag.textContent = "Last updated: " + new Date().toLocaleTimeString();
            }).catch(() => { if (!isRefresh) renderCommList(null, false); });
        }

        function renderCommList(items, append) {
            const list = document.getElementById("cricCommList");
            if (!list) return;
            if (!append) list.innerHTML = "";
            if (!items || !items.length) {
                if (!append) list.innerHTML = "<div style='padding:10px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Commentary abhi available nahi.</div>";
                return;
            }
            const frag = document.createDocumentFragment();
            items.forEach(wrap => {
                const c = wrap.commentary;
                if (!c || !c.commtxt) return;
                const div = document.createElement("div");
                const cls = classifyComm(c);
                div.className = "cric-comm-item" + (cls ? " " + cls : "");
                const overLabel = c.overnum ? c.overnum + " ov" : "";
                div.innerHTML = "<span class='cco-over'>" + overLabel + "</span>" + formatCommText(c);
                frag.appendChild(div);
            });
            if (append) list.insertBefore(frag, list.firstChild);
            else list.appendChild(frag);
        }

        function toggleCommentary() {
            const card = document.getElementById("cricCommCard");
            const scCard = document.getElementById("cricScCard");
            if (!card) return;
            const willOpen = !card.classList.contains("open");
            if (scCard) scCard.classList.remove("open");
            card.classList.toggle("open", willOpen);
            if (!willOpen) { if (commRefreshTimer) { clearInterval(commRefreshTimer); commRefreshTimer = null; } return; }
            const matchId = getCurrentMatchId();
            if (!matchId) return;
            const m = cricMatches[cricIndex];
            document.getElementById("cricCommTitle").textContent = matchTitle(m);
            commLastBallNbr = null;
            document.getElementById("cricCommList").textContent = "Loading…";
            fetchCommentary(matchId, false);
            if (commRefreshTimer) clearInterval(commRefreshTimer);
            commRefreshTimer = setInterval(() => { if (cricMode === "live") fetchCommentary(matchId, true); }, 60000);
        }

        function closeCommentaryCard() {
            const card = document.getElementById("cricCommCard");
            if (card) card.classList.remove("open");
            if (commRefreshTimer) { clearInterval(commRefreshTimer); commRefreshTimer = null; }
        }

        // === SCORECARD ===
        function renderBattingTable(inn) {
            const bat = (inn.batsman || []);
            let rows = bat.map(b => {
                const dismissal = b.outdec || "not out";
                return "<tr><td class='name-col'>" + (b.name || "") + (b.iscaptain ? " (c)" : "") + (b.iskeeper ? " †" : "") +
                    "<div class='dismissal'>" + dismissal + "</div></td>" +
                    "<td>" + (b.runs != null ? b.runs : "-") + "</td>" +
                    "<td>" + (b.balls != null ? b.balls : "-") + "</td>" +
                    "<td>" + (b.fours != null ? b.fours : "-") + "</td>" +
                    "<td>" + (b.sixes != null ? b.sixes : "-") + "</td>" +
                    "<td>" + (b.strkrate || "-") + "</td></tr>";
            }).join("");
            return "<div class='cric-sc-table-wrap'><table class='cric-sc-table'>" +
                "<tr><th class='name-col'>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr>" +
                rows + "</table></div>";
        }

        function renderBowlingTable(inn) {
            const bowl = (inn.bowler || []);
            let rows = bowl.map(b => {
                return "<tr><td class='name-col'>" + (b.name || "") + "</td>" +
                    "<td>" + (b.overs != null ? b.overs : "-") + "</td>" +
                    "<td>" + (b.maidens != null ? b.maidens : "-") + "</td>" +
                    "<td>" + (b.runs != null ? b.runs : "-") + "</td>" +
                    "<td>" + (b.wickets != null ? b.wickets : "-") + "</td>" +
                    "<td>" + (b.economy || "-") + "</td></tr>";
            }).join("");
            return "<div class='cric-sc-table-wrap'><table class='cric-sc-table'>" +
                "<tr><th class='name-col'>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr>" +
                rows + "</table></div>";
        }

        function renderScInnings(idx) {
            const body = document.getElementById("cricScBody");
            if (!body || !scInningsData[idx]) { body.innerHTML = "<div style='padding:10px;color:var(--ink-faint);font-size:0.72rem;'>Data available nahi.</div>"; return; }
            const inn = scInningsData[idx];
            const extras = inn.extras || {};
            const extrasTotal = extras.total != null ? extras.total : ((extras.wides||0)+(extras.noballs||0)+(extras.byes||0)+(extras.legbyes||0));
            body.innerHTML =
                "<div class='cric-sc-section-title'>Batting</div>" +
                renderBattingTable(inn) +
                "<div class='cric-sc-extras'>Extras: " + extrasTotal + "</div>" +
                "<div class='cric-sc-total'>Total: " + (inn.score != null ? inn.score : "-") +
                "/" + (inn.wickets != null ? inn.wickets : "-") +
                " (" + (inn.overs != null ? inn.overs : "-") + " ov)</div>" +
                "<div class='cric-sc-section-title'>Bowling</div>" +
                renderBowlingTable(inn);
        }

        function renderScTabs() {
            const tabs = document.getElementById("cricScTabs");
            if (!tabs) return;
            tabs.innerHTML = scInningsData.map((inn, i) => {
                const label = inn.batteamsname || inn.batteamname || ("Innings " + (i + 1));
                return "<button class='cric-sc-tab" + (i === scActiveIdx ? " active" : "") +
                    "' data-i='" + i + "'>" + label + "</button>";
            }).join("");
        }

        function fetchScorecard(matchId) {
            cricFetch("/mcenter/v1/" + matchId + "/hscard").then(data => {
                if (!data || !data.scorecard || !data.scorecard.length) {
                    document.getElementById("cricScBody").innerHTML = "<div style='padding:10px;text-align:center;color:var(--ink-faint);font-size:0.72rem;'>Scorecard abhi available nahi.</div>";

                }
                scInningsData = data.scorecard;
                scActiveIdx = scInningsData.length - 1;
                renderScTabs();
                renderScInnings(scActiveIdx);

            });

        function toggleScorecard() {
            const card = document.getElementById("cricScCard");
            const commCard = document.getElementById("cricCommCard");
            if (!card) return;
            const willOpen = !card.classList.contains("open");
            if (commCard) commCard.classList.remove("open");
            if (commRefreshTimer) { clearInterval(commRefreshTimer); commRefreshTimer = null; }
            card.classList.toggle("open", willOpen);
            if (!willOpen) return;
            const matchId = getCurrentMatchId();
            if (!matchId) return;
            const m = cricMatches[cricIndex];
            document.getElementById("cricScTitle").textContent = matchTitle(m);
            document.getElementById("cricScTabs").innerHTML = "";
            document.getElementById("cricScBody").textContent = "Loading…";
            fetchScorecard(matchId);
        }

        function closeScorecardCard() {
            const card = document.getElementById("cricScCard");
            if (card) card.classList.remove("open");
        }

        function openCricDetail(m) {
            const overlay = document.getElementById("cricOverlay");
            const body = document.getElementById("cricScorecardBody");
            if (!overlay || !body) return;
            const mi = m.matchInfo;
            let html = "<h3>" + matchTitle(m) + "</h3>";
            html += "<span class='cric-sc-live'" + (cricMode === "upcoming" ? " style='color:var(--gold);background:var(--gold-light);'" : "") + ">" +
                (cricMode === "live" ? "Live" : "Upcoming") + "</span>";
            html += "<div class='cric-sc-update'>" + (mi.status || "") + "</div>";
            if (cricMode === "live" && m.matchScore) {
                html += "<table class='cric-sc-table'><tr><th>Team</th><th>Score</th></tr>";
                ["team1Score", "team2Score"].forEach(key => {
                    const teamScore = m.matchScore[key];
                    const teamObj = key === "team1Score" ? mi.team1 : mi.team2;
                    if (teamScore) {
                        Object.keys(teamScore).forEach(inn => {
                            const s = teamScore[inn];
                            html += "<tr><td>" + teamObj.teamName + "</td><td>" + s.runs + "/" + s.wickets + " (" + s.overs + " ov)</td></tr>";
                        });
                    }
                });
                html += "</table>";
            }
            if (mi.venueInfo) html += "<div class='cric-sc-update'>📍 " + mi.venueInfo.ground + ", " + mi.venueInfo.city + "</div>";
            if (cricMode === "upcoming") {
                const start = Number(mi.startDate);
                html += "<div class='cric-sc-update'>📅 " + (start ? new Date(start).toString() : "") + "</div>";
            }
            body.innerHTML = html;
            overlay.classList.add("open");
        }

       // ===== EVENT BINDINGS =====

        if (m) openCricDetail(m);
    });

    document.getElementById("cricPrevBtn").addEventListener("click", function() { goToCric(cricIndex - 1); });

        document.getElementById("cricSquadCard").classList.remove("open");

        const dot = e.target.closest(".cric-dot");
        if (dot) goToCric(Number(dot.dataset.i));
    });

    document.getElementById("cricCommCardClose").addEventListener("click", closeCommentaryCard);

    document.getElementById("cricScBtn").addEventListener("click", toggleScorecard);
    document.getElementById("cricScCardClose").addEventListener("click", closeScorecardCard);

    document.getElementById("cricSquadBtn").addEventListener("click", toggleSquad);
    document.getElementById("cricSquadCardClose").addEventListener("click", closeSquadCard);

    document.getElementById("cricSquadTabs").addEventListener("click", function(e) {
        const tab = e.target.closest(".cric-squad-tab");
        if (!tab) return;
        squadActiveTeam = Number(tab.dataset.team);
        const m = cricMatches[cricIndex];
        if (!m) return;
        renderSquadTabs(m);
        const matchId = getCurrentMatchId();
        const teamId = squadActiveTeam === 1 ? m.matchInfo.team1.teamId : m.matchInfo.team2.teamId;
        loadSquad(matchId, teamId);
    });

    document.getElementById("cricScTabs").addEventListener("click", function(e) {
        const tab = e.target.closest(".cric-sc-tab");

        renderScTabs();
        renderScInnings(scActiveIdx);
    });

    document.getElementById("cricClose").addEventListener("click", function() {
        document.getElementById("cricOverlay").classList.remove("open");
    });
    document.getElementById("cricOverlay").addEventListener("click", function(e) {
        if (e.target === this) this.classList.remove("open");
    });

    document.getElementById("burgerBtn").addEventListener("click", function() {
        document.getElementById("mobilePanel").classList.toggle("open");
    });
});
    </script>
</body>
</html>
